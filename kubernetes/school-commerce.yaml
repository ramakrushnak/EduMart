apiVersion: v1
kind: Namespace
metadata:
  name: school-commerce

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: django-config
  namespace: school-commerce
data:
  DEBUG: "False"
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  DB_ENGINE: "django.db.backends.postgresql"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KAFKA_BROKER_URL: "kafka-service:9092"
  ALLOWED_HOSTS: "api.schoolcommerce.com,www.schoolcommerce.com"

---
apiVersion: v1
kind: Secret
metadata:
  name: django-secrets
  namespace: school-commerce
type: Opaque
stringData:
  SECRET_KEY: "your-secret-key-change-in-production"
  JWT_SECRET_KEY: "your-jwt-secret-key"
  DB_NAME: "school_commerce"
  DB_USER: "postgres"
  DB_PASSWORD: "postgres-password"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  EMAIL_HOST_PASSWORD: "your-email-password"
  CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq-service:5672//"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: school-commerce
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: school-commerce
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: school-commerce
spec:
  ports:
    - port: 9092
      targetPort: 9092
  selector:
    app: kafka

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: school-commerce
spec:
  ports:
    - port: 5672
      targetPort: 5672
    - port: 15672
      targetPort: 15672
  selector:
    app: rabbitmq

---
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: school-commerce
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: django

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
  namespace: school-commerce
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      containers:
      - name: django
        image: school-commerce:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secrets
        livenessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-deployment
  namespace: school-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: school-commerce:latest
        command: ["celery", "-A", "config", "worker", "-l", "info"]
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: django-hpa
  namespace: school-commerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: django-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
