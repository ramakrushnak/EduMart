version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: school_commerce_db
    environment:
      POSTGRES_DB: school_commerce_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_commerce_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: school_commerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_commerce_network

  # Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: school_commerce_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - school_commerce_network

  # Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: school_commerce_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - school_commerce_network

  # RabbitMQ (Celery Broker)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: school_commerce_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - school_commerce_network

  # Django Application
  django:
    build: .
    container_name: school_commerce_django
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py load_fixtures &&
      gunicorn --bind 0.0.0.0:8000 --workers 4 config.wsgi:application
      "
    ports:
      - "8000:8000"
    environment:
      DEBUG: 'True'
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: dev-secret-key-change-in-production
      DB_NAME: school_commerce_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      KAFKA_BROKER_URL: kafka:9092
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      ALLOWED_HOSTS: localhost,127.0.0.1,django
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - school_commerce_network

  # Celery Worker
  celery:
    build: .
    container_name: school_commerce_celery
    command: celery -A config worker -l info
    environment:
      DEBUG: 'True'
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: dev-secret-key-change-in-production
      DB_NAME: school_commerce_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    volumes:
      - .:/app
    depends_on:
      - django
      - rabbitmq
      - redis
    networks:
      - school_commerce_network

  # Celery Beat (Scheduler)
  celery-beat:
    build: .
    container_name: school_commerce_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: 'True'
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: dev-secret-key-change-in-production
      DB_NAME: school_commerce_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    volumes:
      - .:/app
    depends_on:
      - django
      - rabbitmq
    networks:
      - school_commerce_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: school_commerce_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/app/staticfiles:ro
    depends_on:
      - django
    networks:
      - school_commerce_network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: school_commerce_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - school_commerce_network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: school_commerce_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - school_commerce_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  school_commerce_network:
    driver: bridge
