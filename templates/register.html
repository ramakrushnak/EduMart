<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | EduMart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#2563eb,#1e40af);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-container{background:white;border-radius:18px;box-shadow:0 20px 40px rgba(15,23,42,0.2);width:100%;max-width:420px;padding:40px;}
.logo{font-size:28px;font-weight:700;color:#0f172a;margin-bottom:30px;text-align:center;}
.form-title{font-size:26px;font-weight:700;color:#0f172a;margin-bottom:8px;}
.form-subtitle{color:#64748b;font-size:14px;margin-bottom:28px;}
.form-group{margin-bottom:18px;}
label{display:block;font-weight:600;color:#0f172a;margin-bottom:6px;font-size:14px;}
input{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;transition:border-color .2s ease;}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.messages{margin-bottom:20px;}
.message{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:8px;}
.message.error{background:#fee2e2;color:#991b1b;}
.message.success{background:#dcfce7;color:#166534;}
.btn{width:100%;padding:12px 16px;background:#2563eb;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:background .2s ease;margin-top:8px;}
.btn:hover{background:#1d4ed8;}
.link{text-align:center;margin-top:20px;font-size:14px;color:#64748b;}
.link a{color:#2563eb;text-decoration:none;font-weight:600;}
.link a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="auth-container">
    <div class="logo">EduMart</div>
    
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    
    <h1 class="form-title">Create Account</h1>
    <p class="form-subtitle">Join EduMart and start shopping</p>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        
        <div class="form-group">
            <label for="first_name">Full Name</label>
            <input type="text" id="first_name" name="first_name" placeholder="John Doe" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        
        <div class="form-group">
            <label for="password_confirm">Confirm Password</label>
            <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn">Create Account</button>
    </form>
    
    <div class="link">
        Already have an account? <a href="{% url 'login_page' %}">Sign in</a>
    </div>
    
    <div class="link">
        <a href="/">Back to Home</a>
    </div>
</div>
</body>
</html>
